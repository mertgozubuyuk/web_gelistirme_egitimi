<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yazılım Geliştirici Profil Kartı</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Ana Kart Bölümü -->
    <div class="profile-card">
      <!-- Profil Resim Alanı -->
      <div class="profile-header">
        <img
          src="./images/profil_resmi.jpeg"
          alt="Profil Fotoğrafı"
          class="profile-image"
        />
        <h1 class="dev-name">Mert Gözübüyük</h1>
        <p class="dev-title">Junior Web Geliştirici</p>
      </div>

      <!-- Yetenekler Alanı -->
      <div class="skills-section">
        <h2>Yetenekler</h2>
        <div class="skills-container">
          <span class="skill-tag">HTML</span>
          <span class="skill-tag">CSS</span>
          <span class="skill-tag">JavaScript</span>
          <span class="skill-tag">React</span>
          <span class="skill-tag">Node.js</span>
        </div>
      </div>

      <!-- İletişim Bölümü -->
      <div class="contact-section">
        <a
          href="https://github.com/mertgozubuyuk"
          target="_blank"
          class="contact-link"
          >GitHub</a
        >
        <a
          href="mailto:mertgozubuyuk26@gmail.com"
          class="contact-link"
          >E-posta</a
        >
        <a href="#" target="_blank" class="contact-link">Linkledn</a>
      </div>
    </div>
  </body>
</html>
