<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Flex Basis-Grow-Shrink</title>
    <style>
      .conteiner {
        border: 2px solid red;
        width: 600px;
        height: 300px;
        display: flex;
        gap: 10px;
        flex-direction: row;
      }

      .conteiner div {
        background-color: aqua;
      }

      .item-4 {
        flex-basis: 400px;
      }

      .item-2 {
        flex-grow: 1;
      }

      .item-6 {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="conteiner">
      <div class="item-1">Öge 1</div>
      <div class="item-2">Öge 2</div>
      <div class="item-3">Öge 3</div>
      <div class="item-4">Öge 4</div>
      <div class="item-5">Öge 5</div>
      <div class="item-6">Öge 6</div>
      <div class="item-7">Öge 7</div>
      <div class="item-8">Öge 8</div>
      <div class="item-9">Öge 9</div>
      <div class="item-10">Öge 10</div>
    </div>
  </body>
</html>
