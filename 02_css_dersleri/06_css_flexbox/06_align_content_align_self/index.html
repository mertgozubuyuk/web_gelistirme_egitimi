<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Align Content and Align Self</title>
    <style>
      .conteiner-1 {
        border: 2px solid red;
        height: 300px;
        width: 300px;
        display: flex;
        flex-direction: row;
        gap: 10px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .conteiner-1 div {
        background-color: aqua;
      }

      .conteiner-2 {
        border: 2px solid red;
        height: 300px;
        width: 300px;
        display: flex;
        flex-direction: row;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .conteiner-2 div {
        background-color: aqua;
      }

      .item-5 {
        align-self: flex-end;
      }
    </style>
  </head>
  <body>
    <div class="conteiner-1">
      <div class="item-1">Öge 1</div>
      <div class="item-2">Öge 2</div>
      <div class="item-3">Öge 3</div>
      <div class="item-4">Öge 4</div>
      <div class="item-5">Öge 5</div>
      <div class="item-6">Öge 6</div>
      <div class="item-7">Öge 7</div>
      <div class="item-8">Öge 8</div>
      <div class="item-9">Öge 9</div>
      <div class="item-10">Öge 10</div>
    </div>
    <br />
    <div class="conteiner-2">
      <div class="item-1">Öge 1</div>
      <div class="item-2">Öge 2</div>
      <div class="item-3">Öge 3</div>
      <div class="item-4">Öge 4</div>
      <div class="item-5">Öge 5</div>
      <div class="item-6">Öge 6</div>
      <div class="item-7">Öge 7</div>
      <div class="item-8">Öge 8</div>
      <div class="item-9">Öge 9</div>
      <div class="item-10">Öge 10</div>
    </div>
  </body>
</html>
