<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Order Özelliği</title>
    <style>
      .conteiner {
        border: 2px solid red;
        width: 600px;
        height: 400px;
        gap: 10px;
        display: flex;
      }

      .conteiner div {
        background-color: aqua;
      }

      .item-3 {
        order: 2;
      }
      .item-5 {
        order: 1;
      }

      .item-8 {
        order: -1;
      }
      .item-9 {
        order: -2;
      }

      .item-10 {
        order: -1;
      }
    </style>
  </head>
  <body>
    <div class="conteiner">
      <div class="item-1">Öge 1</div>
      <div class="item-2">Öge 2</div>
      <div class="item-3">Öge 3</div>
      <div class="item-4">Öge 4</div>
      <div class="item-5">Öge 5</div>
      <div class="item-6">Öge 6</div>
      <div class="item-7">Öge 7</div>
      <div class="item-8">Öge 8</div>
      <div class="item-9">Öge 9</div>
      <div class="item-10">Öge 10</div>
    </div>
  </body>
</html>
