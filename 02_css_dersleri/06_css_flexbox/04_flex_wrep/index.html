<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Flex Wrap</title>
    <style>
      .conteiner {
        border: 3px solid red;
        height: 300px;
        width: 250px;
        display: flex;
        flex-direction: row;
        gap: 10px;
        flex-wrap: wrap;
      }

      .conteiner div {
        background-color: aqua;
      }

      .box {
        border: 3px solid black;
        width: 200px;
        height: 150px;
        gap: 10px;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap-reverse;
      }

      .box div {
        background-color: burlywood;
      }
    </style>
  </head>
  <body>
    <div class="conteiner">
      <div class="item-1">Öge 1</div>
      <div class="item-2">Öge 2</div>
      <div class="item-3">Öge 3</div>
      <div class="item-4">Öge 4</div>
      <div class="item-5">Öge 5</div>
      <div class="item-6">Öge 6</div>
      <div class="item-7">Öge 7</div>
      <div class="item-8">Öge 8</div>
      <div class="item-9">Öge 9</div>
      <div class="item-10">Öge 10</div>
    </div>

    <br />
    <br />

    <div class="box">
      <div class="item-1">Öge 1</div>
      <div class="item-2">Öge 2</div>
      <div class="item-3">Öge 3</div>
      <div class="item-4">Öge 4</div>
      <div class="item-5">Öge 5</div>
      <div class="item-6">Öge 6</div>
      <div class="item-7">Öge 7</div>
      <div class="item-8">Öge 8</div>
      <div class="item-9">Öge 9</div>
      <div class="item-10">Öge 10</div>
    </div>
  </body>
</html>
